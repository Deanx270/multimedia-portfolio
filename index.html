<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dean | Multimedia Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="styles.css">
    
    <script src="navbar.js" defer></script>
    <script src="footer.js" defer></script> 
</head>
<body class="antialiased relative min-h-screen flex flex-col overflow-x-hidden font-sans">
    
    <portfolio-nav></portfolio-nav>

    <main class="flex-grow flex items-center pt-32 pb-20 px-6">
        <div class="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            
            <div class="text-left -translate-y-[7px]">
                <div class="inline-flex items-center gap-3 mb-8">
                    <span class="w-8 h-[1px] bg-brand-accent"></span>
                    <span class="text-brand-accent text-xs font-bold uppercase tracking-widest">Multimedia & Authoring</span>
                </div>
                
                <h1 class="text-5xl md:text-6xl lg:text-7xl font-bold text-brand-ink mb-6 leading-[1.1] tracking-tight">
                    Life in <br />
                    <span class="italic font-light text-gray-500">Active Frames.</span>
                </h1>
                
                <p class="text-lg md:text-xl text-gray-600 mb-10 max-w-md font-light leading-relaxed">
                    Exploring visual storytelling and digital authoring, frame by frame.
                </p>
                
                <a href="rotoscoping.html" class="inline-flex items-center justify-center gap-3 px-8 py-4 bg-brand-ink text-white font-medium rounded hover:bg-brand-accent transition-all duration-300 shadow-xl shadow-gray-300/50 group">
                    View Rotoscoping Progress
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </a>
            </div>

            <div class="relative w-full aspect-[4/3] image-frame bg-gray-200">
                <img 
                    src="assets/rotoscoping_reference.png" 
                    alt="Rotoscoping reference frame" 
                    class="w-full h-full object-cover"
                />
                
                <div class="absolute inset-0 bg-gradient-to-tr from-brand-ink/20 to-transparent"></div>
                
                <div class="absolute bottom-6 left-6 bg-white/90 backdrop-blur px-4 py-2 rounded shadow-sm flex items-center gap-3">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    <span class="text-xs font-bold tracking-widest text-brand-ink uppercase">Raw Reference Footage</span>
                </div>
            </div>

        </div>
    </main>

    <portfolio-footer></portfolio-footer>

</body>
</html>
